<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 44">
  <!-- Car body -->
  <rect x="2" y="22" width="44" height="13" rx="3" fill="white"/>

  <!-- Car roof / cabin trapezoid -->
  <path d="M8 22 L13 11 L37 11 L42 22Z" fill="white"/>

  <!-- Left window -->
  <rect x="14" y="13" width="8" height="7" rx="1" fill="#a5b4fc"/>
  <!-- Right window -->
  <rect x="26" y="13" width="8" height="7" rx="1" fill="#a5b4fc"/>

  <!-- Left passenger head -->
  <circle cx="18" cy="16" r="2.8" fill="#c7d2fe"/>
  <!-- Right passenger head -->
  <circle cx="30" cy="16" r="2.8" fill="#c7d2fe"/>

  <!-- Rear wheel -->
  <circle cx="13" cy="35" r="5"   fill="#1e3a8a" stroke="white" stroke-width="1.5"/>
  <circle cx="13" cy="35" r="1.8" fill="white"/>
  <!-- Front wheel -->
  <circle cx="37" cy="35" r="5"   fill="#1e3a8a" stroke="white" stroke-width="1.5"/>
  <circle cx="37" cy="35" r="1.8" fill="white"/>

  <!-- Route / journey dots -->
  <circle cx="8"  cy="43" r="1.5" fill="white" opacity="0.30"/>
  <circle cx="16" cy="43" r="1.5" fill="white" opacity="0.55"/>
  <circle cx="24" cy="43" r="1.5" fill="white" opacity="0.75"/>
  <circle cx="32" cy="43" r="1.5" fill="white" opacity="0.55"/>
  <circle cx="40" cy="43" r="1.5" fill="white" opacity="0.30"/>

  <!-- Divider line -->
  <line x1="52" y1="10" x2="52" y2="34" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Wordmark: "Ride Sharing" -->
  <text x="62" y="22"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
    font-size="15" font-weight="700" fill="white" letter-spacing="-0.2">Ride Sharing</text>

  <!-- Wordmark: "SYSTEM" -->
  <text x="63" y="37"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
    font-size="10.5" font-weight="500" fill="rgba(255,255,255,0.60)" letter-spacing="2.2">SYSTEM</text>
</svg>
